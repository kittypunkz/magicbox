name: 🚀 Manual Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      component:
        description: 'Component to deploy'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - backend
          - frontend
          - database
      skip_tests:
        description: 'Skip type checking?'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  # Database Migrations
  migrate:
    name: 🗄️ Apply Database Migrations
    runs-on: ubuntu-latest
    if: github.event.inputs.component == 'database' || github.event.inputs.component == 'full'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./backend
          command: d1 migrations apply magicbox-db --remote

  # Deploy Backend
  deploy-backend:
    name: ⚡ Deploy Backend
    runs-on: ubuntu-latest
    needs: migrate
    if: github.event.inputs.component == 'backend' || github.event.inputs.component == 'full'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        if: github.event.inputs.skip_tests == 'false'
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./backend
          command: deploy

  # Deploy Frontend
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.event.inputs.component == 'frontend' || github.event.inputs.component == 'full'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        if: github.event.inputs.skip_tests == 'false'
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./frontend
          command: pages deploy dist --project-name=magicbox-app

  # Notify Success
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          echo "🚀 Deployment completed!"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Component: ${{ github.event.inputs.component }}"
          echo ""
          echo "🔗 URLs:"
          echo "  Web App: https://magicbox.bankapirak.com"
          echo "  API: https://api.magicbox.bankapirak.com"
