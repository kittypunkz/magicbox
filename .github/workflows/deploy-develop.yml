name: Deploy to Dev Environment

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}

jobs:
  deploy-backend:
    name: Deploy Backend to Dev
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers (Dev)
        run: wrangler deploy --config wrangler.toml --env dev

  deploy-frontend:
    name: Deploy Frontend to Dev
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages (Dev)
        run: wrangler pages deploy dist --project-name=magicbox-app-dev

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          echo "🚀 DEV Deployment Status:"
          echo "  Backend: ${{ needs.deploy-backend.result }}"
          echo "  Frontend: ${{ needs.deploy-frontend.result }}"
          echo ""
          echo "🔗 DEV URLs:"
          echo "  Web App: https://dev.magicbox.bankapirak.com"
          echo "  API: https://api-dev.magicbox.bankapirak.com"
