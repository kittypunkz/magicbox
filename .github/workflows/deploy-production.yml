name: Deploy to Production

on:
  # DISABLED: Auto-deploy on push to prevent accidental production deployments
  # push:
  #   branches: [main]
  
  # Manual trigger only - requires confirmation
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy --config wrangler.toml

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=magicbox-app

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          echo "🚀 PRODUCTION Deployment Status:"
          echo "  Backend: ${{ needs.deploy-backend.result }}"
          echo "  Frontend: ${{ needs.deploy-frontend.result }}"
          echo ""
          echo "🔗 PRODUCTION URLs:"
          echo "  Web App: https://magicbox.bankapirak.com"
          echo "  API: https://api.magicbox.bankapirak.com"
