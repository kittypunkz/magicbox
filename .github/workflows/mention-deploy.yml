name: 💬 Deploy on Mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

env:
  NODE_VERSION: '20'

jobs:
  check-mention:
    name: Check for Deploy Mention
    runs-on: ubuntu-latest
    if: |
      github.event.comment.body contains '@deploy' || 
      github.event.comment.body contains '@magicbox deploy' ||
      github.event.comment.body contains '/deploy'

    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Parse deploy command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          
          # Default values
          COMPONENT="full"
          ENV="production"
          
          # Parse component
          if echo "$COMMENT" | grep -qi "backend"; then
            COMPONENT="backend"
          elif echo "$COMMENT" | grep -qi "frontend"; then
            COMPONENT="frontend"
          elif echo "$COMMENT" | grep -qi "database\|migrate\|db"; then
            COMPONENT="database"
          fi
          
          # Parse environment
          if echo "$COMMENT" | grep -qi "staging\|dev"; then
            ENV="staging"
          fi
          
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          
          echo "📝 Parsed command:"
          echo "  Component: $COMPONENT"
          echo "  Environment: $ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Deploy based on parsed component
      - name: Deploy Backend
        if: steps.parse.outputs.component == 'backend' || steps.parse.outputs.component == 'full'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./backend
          command: deploy

      - name: Build Frontend
        if: steps.parse.outputs.component == 'frontend' || steps.parse.outputs.component == 'full'
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy Frontend
        if: steps.parse.outputs.component == 'frontend' || steps.parse.outputs.component == 'full'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./frontend
          command: pages deploy dist --project-name=magicbox-app

      - name: Apply Database Migrations
        if: steps.parse.outputs.component == 'database'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./backend
          command: d1 migrations apply magicbox-db --remote

      - name: Reply with success
        uses: actions/github-script@v7
        with:
          script: |
            const component = '${{ steps.parse.outputs.component }}';
            const env = '${{ steps.parse.outputs.environment }}';
            
            const body = `✅ **Deployment successful!**
            
            - **Component:** ${component}
            - **Environment:** ${env}
            - **Time:** ${new Date().toISOString()}
            
            🔗 **URLs:**
            - Web App: https://magicbox.bankapirak.com
            - API: https://api.magicbox.bankapirak.com
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
